<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi CRM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      color: #1a1a2e;
      margin-bottom: 2rem;
    }

    button {
      padding: 0.85rem 2.5rem;
      font-size: 1.1rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #3730a3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bienvenido a mi CRM</h1>
    <button>Comenzar</button>
  </div>
</body>
</html>
